name: Ansible Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Checkout (only for workflow context)
    - name: Checkout Code
      uses: actions/checkout@v3

    # Setup SSH key
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    # Add server to known_hosts
    - name: Add Known Hosts
      run: |
        ssh-keyscan -H ${{ secrets.ANSIBLE_HOST }} >> ~/.ssh/known_hosts

    # 🚀 Deploy
    - name: Deploy via SSH
      run: |
        ssh ${{ secrets.ANSIBLE_USER }}@${{ secrets.ANSIBLE_HOST }} << 'EOF'

          echo "🚀 Starting Deployment..."

          # Install dependencies (safe to rerun)
          sudo dnf install -y git python3 python3-pip

          # Install Ansible if missing
          if ! command -v ansible >/dev/null 2>&1; then
            pip3 install --user ansible
          fi

          # Fix PATH
          export PATH=$PATH:/home/${USER}/.local/bin

          # Clean old deployment
          rm -rf ~/ansible-project

          # Clone latest repo
          git clone https://github.com/awsSubhash/ansible-automation.git

          cd ~/ansible-project

          echo "📂 Current directory:"
          pwd

          echo "📂 Files in repo:"
          ls -la

          echo "🔍 Searching for playbook..."
          
          # Auto-detect playbook file
          if [ -f "playbook.yml" ]; then
            PLAYBOOK="playbook.yml"
          elif [ -f "site.yml" ]; then
            PLAYBOOK="site.yml"
          else
            echo "❌ No playbook found!"
            exit 1
          fi

          echo "📦 Running Ansible Playbook: $PLAYBOOK"

          ansible-playbook $PLAYBOOK

          echo "✅ Deployment Completed Successfully"

        EOF
