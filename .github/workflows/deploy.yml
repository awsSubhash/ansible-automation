name: Ansible Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.ANSIBLE_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy via SSH
      run: |
        ssh ${{ secrets.ANSIBLE_USER }}@${{ secrets.ANSIBLE_HOST }} << 'EOF'

          echo "🚀 Starting Deployment..."

          # Install dependencies
          sudo dnf install -y git python3 python3-pip

          # Install Ansible
          if ! command -v ansible >/dev/null 2>&1; then
            pip3 install --user ansible
          fi

          export PATH=$PATH:/home/${USER}/.local/bin

          # Clean old repo
          rm -rf ~/ansible-automation

          # ✅ Use SSH clone (FIXED)
          git clone https://github.com/awsSubhash/ansible-automation.git

          cd ~/ansible-automation

          echo "📂 Project files:"
          ls -la

          # ✅ Ensure correct playbook
          if [ ! -f "playbook.yml" ]; then
            echo "❌ playbook.yml not found in root!"
            exit 1
          fi

          echo "📦 Running Ansible Playbook..."

          ansible-playbook -i inventory.ini playbook.yml

          echo "✅ Deployment Completed Successfully"

        EOF
