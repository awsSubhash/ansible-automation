name: Ansible Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code (for workflow only)
      uses: actions/checkout@v3

    # Setup SSH Key
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    # Add host to known_hosts
    - name: Add Known Hosts
      run: |
        ssh-keyscan -H ${{ secrets.ANSIBLE_HOST }} >> ~/.ssh/known_hosts

    # 🚀 Main Deployment Step
    - name: Deploy via SSH
      run: |
        ssh ${{ secrets.ANSIBLE_USER }}@${{ secrets.ANSIBLE_HOST }} << 'EOF'

          echo "🚀 Starting Deployment..."

          # Install required packages (only first time, safe to rerun)
          sudo dnf install -y git python3 python3-pip

          # Install Ansible if not present
          if ! command -v ansible >/dev/null 2>&1; then
            pip3 install --user ansible
          fi

          # Fix PATH
          export PATH=$PATH:/home/${USER}/.local/bin

          # Remove old project (clean deployment)
          rm -rf ~/ansible-project

          # Clone latest code
          git clone https://github.com/YOUR_USERNAME/YOUR_REPO.git ~/ansible-project

          cd ~/ansible-project

          echo "📦 Running Ansible Playbook..."

          ansible-playbook playbook.yml

          echo "✅ Deployment Completed Successfully"

        EOF
