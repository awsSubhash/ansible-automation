name: Ansible Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Add Known Hosts
      run: |
        ssh-keyscan -H ${{ secrets.ANSIBLE_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy via SSH
      run: |
        ssh ${{ secrets.ANSIBLE_USER }}@${{ secrets.ANSIBLE_HOST }} << 'EOF'

          echo "🚀 Starting Deployment..."

          # Install dependencies
          sudo dnf install -y git python3 python3-pip

          # Install Ansible if not present
          if ! command -v ansible >/dev/null 2>&1; then
            pip3 install --user ansible
          fi

          export PATH=$PATH:/home/${USER}/.local/bin

          # Clean old repo
          rm -rf ~/ansible-automation

          # Clone repo (IMPORTANT: correct repo name)
          git clone https://github.com/YOUR_USERNAME/YOUR_REPO.git ~/ansible-automation

          # Go to correct directory
          cd ~/ansible-automation

          echo "📂 Root directory:"
          pwd
          ls -la

          echo "🔍 Searching for playbook in project..."

          # 🔎 Find playbook anywhere
          PLAYBOOK=$(find . -name "playbook.yml" -o -name "site.yml" | head -n 1)

          if [ -z "$PLAYBOOK" ]; then
            echo "❌ No playbook found anywhere in repo!"
            echo "📂 Full structure:"
            find .
            exit 1
          fi

          echo "✅ Found playbook at: $PLAYBOOK"

          echo "📦 Running Ansible Playbook..."

          ansible-playbook $PLAYBOOK

          echo "✅ Deployment Completed Successfully"

        EOF
